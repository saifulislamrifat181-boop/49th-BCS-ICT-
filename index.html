<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>49th BCS Preliminary Exam (ICT)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0f1c;
  --surface: #131929;
  --surface2: #1a2336;
  --border: #1f2e46;
  --accent: #4f8ef7;
  --accent2: #7c3aed;
  --green: #10b981;
  --red: #f04f5a;
  --yellow: #f59e0b;
  --text: #dde3f0;
  --muted: #5a6a85;
  --radius: 16px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(79,142,247,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,142,247,0.025) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events:none;
  z-index:0;
}

/* HEADER */
header {
  position: relative;
  z-index: 10;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: rgba(11,15,28,0.92);
  backdrop-filter: blur(12px);
  flex-wrap: wrap;
  gap: 10px;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1rem;
  color: var(--accent);
}
.logo span { color: var(--text); }
.header-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.badge {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  padding: 4px 11px;
  border-radius: 99px;
  border: 1px solid var(--border);
  background: var(--surface2);
  display: flex; align-items: center; gap: 5px;
}
.badge .lbl { color: var(--muted); }
.badge .val { color: var(--text); font-weight: 500; }
.badge .val.g { color: var(--green); }
.badge .val.r { color: var(--red); }
.restart-btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.76rem;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
}
.restart-btn:hover { background: rgba(240,79,90,0.1); border-color: rgba(240,79,90,0.35); color: var(--red); }

/* PROGRESS */
.progress-row {
  position: relative; z-index: 5;
  padding: 10px 24px;
  display: flex; align-items: center; gap: 12px;
  background: rgba(11,15,28,0.7);
  border-bottom: 1px solid var(--border);
}
.prog-track { flex:1; height:5px; background:var(--surface2); border-radius:99px; overflow:hidden; }
.prog-fill {
  height:100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius:99px;
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
}
.prog-label { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--muted); white-space:nowrap; }

/* DOTS */
.dots-row {
  position:relative; z-index:5;
  padding: 8px 24px;
  display:flex; flex-wrap:wrap; gap:5px;
  background: rgba(11,15,28,0.5);
  border-bottom: 1px solid var(--border);
}
.dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--surface2); border:1px solid var(--border);
  cursor:pointer; transition:all 0.2s; flex-shrink:0;
}
.dot.current { background:var(--accent); border-color:var(--accent); transform:scale(1.35); }
.dot.correct { background:var(--green); border-color:var(--green); }
.dot.wrong   { background:var(--red);   border-color:var(--red); }

/* MAIN */
main {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding: 28px 16px 48px;
  position:relative; z-index:2;
}

/* CARD */
.quiz-card {
  width:100%; max-width:700px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  animation: fadeSlide 0.32s ease;
  box-shadow: 0 20px 56px rgba(0,0,0,0.45), 0 0 0 1px rgba(79,142,247,0.05);
}
@keyframes fadeSlide {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

.card-top {
  padding: 26px 26px 18px;
  background: linear-gradient(135deg, var(--surface) 0%, #161f35 100%);
  border-bottom: 1px solid var(--border);
}
.q-meta { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
.q-num-tag {
  font-family:'DM Mono',monospace; font-size:0.68rem;
  color:var(--accent); background:rgba(79,142,247,0.1);
  border:1px solid rgba(79,142,247,0.25); border-radius:6px;
  padding:2px 9px;
}
.q-topic-tag {
  font-size:0.67rem; color:var(--muted);
  background:var(--surface2); border:1px solid var(--border);
  border-radius:6px; padding:2px 9px;
}
.q-text {
  font-size:0.95rem; line-height:1.68;
  color:var(--text); white-space:pre-line;
}

/* OPTIONS */
.options { padding:18px 26px; display:flex; flex-direction:column; gap:9px; }
.opt-btn {
  display:flex; align-items:center; gap:12px;
  padding:12px 15px;
  border-radius:10px; border:1.5px solid var(--border);
  background:var(--surface2); cursor:pointer;
  transition:all 0.17s; text-align:left; width:100%;
  font-family:'DM Sans',sans-serif; font-size:0.86rem;
  color:var(--text); position:relative; overflow:hidden;
}
.opt-btn::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(79,142,247,0.07),transparent);
  opacity:0; transition:opacity 0.17s;
}
.opt-btn:hover:not(:disabled)::before { opacity:1; }
.opt-btn:hover:not(:disabled) { border-color:var(--accent); transform:translateX(3px); }
.opt-btn:disabled { cursor:default; }
.opt-key {
  font-family:'DM Mono',monospace; font-size:0.68rem; color:var(--muted);
  width:27px; height:27px; border-radius:6px; border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; font-weight:500; background:rgba(255,255,255,0.03);
  transition:all 0.17s;
}
.opt-btn:hover:not(:disabled) .opt-key { background:var(--accent); border-color:var(--accent); color:#fff; }
.opt-btn.correct-opt { background:rgba(16,185,129,0.1); border-color:var(--green); color:var(--green); }
.opt-btn.correct-opt .opt-key { background:var(--green); border-color:var(--green); color:#fff; }
.opt-btn.wrong-opt   { background:rgba(240,79,90,0.08); border-color:var(--red); color:var(--red); }
.opt-btn.wrong-opt   .opt-key { background:var(--red); border-color:var(--red); color:#fff; }

/* VERDICT */
.verdict-row { padding:0 26px 14px; display:none; }
.verdict-box {
  display:flex; align-items:center; gap:10px;
  padding:10px 15px; border-radius:10px;
  font-size:0.83rem; font-weight:500;
}
.v-correct { background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.3); color:var(--green); }
.v-wrong   { background:rgba(240,79,90,0.08); border:1px solid rgba(240,79,90,0.25); color:var(--red); }
.verdict-icon { font-size:1.05rem; }

/* NAV */
.card-nav {
  padding:14px 26px 22px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.nav-btn {
  font-family:'Syne',sans-serif; font-weight:700; font-size:0.83rem;
  padding:10px 22px; border-radius:10px; border:none; cursor:pointer;
  transition:all 0.2s; display:flex; align-items:center; gap:6px;
}
.btn-prev {
  background:var(--surface2); border:1px solid var(--border); color:var(--muted);
}
.btn-prev:hover:not(:disabled) { background:var(--surface); border-color:var(--accent); color:var(--text); }
.btn-prev:disabled { opacity:0.3; cursor:default; }
.btn-next {
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#fff; box-shadow:0 4px 18px rgba(79,142,247,0.28);
}
.btn-next:hover:not(:disabled) { opacity:0.87; transform:translateY(-1px); }
.q-counter { font-family:'DM Mono',monospace; font-size:0.72rem; color:var(--muted); text-align:center; }

/* RESULTS */
#results-screen {
  display:none; width:100%; max-width:640px;
  text-align:center; animation:fadeSlide 0.4s ease;
}
.result-glow {
  width:110px; height:110px; margin:0 auto 22px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex; align-items:center; justify-content:center;
  font-size:2.6rem;
  box-shadow:0 0 50px rgba(79,142,247,0.35),0 0 100px rgba(124,58,237,0.18);
}
.result-title { font-family:'Syne',sans-serif; font-weight:800; font-size:1.9rem; margin-bottom:6px; }
.result-sub { color:var(--muted); font-size:0.87rem; margin-bottom:28px; }
.result-score-big {
  font-family:'Syne',sans-serif; font-weight:800; font-size:4rem;
  color:var(--accent); line-height:1; margin-bottom:4px;
}
.result-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:24px 0; }
.result-stat {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:18px 10px;
}
.rs-val { font-family:'Syne',sans-serif; font-weight:700; font-size:1.7rem; margin-bottom:3px; }
.rs-label { font-size:0.72rem; color:var(--muted); }
.rs-val.g{color:var(--green);} .rs-val.r{color:var(--red);} .rs-val.y{color:var(--yellow);}
.result-restart-btn {
  font-family:'Syne',sans-serif; font-weight:700; font-size:0.93rem;
  padding:13px 34px; border-radius:12px; border:none;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#fff; cursor:pointer;
  box-shadow:0 4px 22px rgba(79,142,247,0.33);
  transition:all 0.2s;
}
.result-restart-btn:hover { opacity:0.87; transform:translateY(-2px); }

@media(max-width:520px){
  .card-top{padding:18px 16px 14px;}
  .options{padding:14px 16px;}
  .card-nav{padding:12px 16px 18px;}
  .verdict-row{padding:0 16px 12px;}
  .dots-row{padding:7px 12px;}
  .q-text{font-size:0.87rem;}
  .result-grid{gap:8px;}
  .rs-val{font-size:1.35rem;}
  .result-score-big{font-size:3rem;}
}
</style>
</head>
<body>

<header>
  <div class="logo">49th BCS <span>· Preliminary Exam (ICT)</span></div>
  <div class="header-right">
    <div class="badge"><span class="lbl">Q</span><span class="val" id="hdr-q">1/100</span></div>
    <div class="badge"><span class="lbl">✓</span><span class="val g" id="hdr-correct">0</span></div>
    <div class="badge"><span class="lbl">✗</span><span class="val r" id="hdr-wrong">0</span></div>
    <button class="restart-btn" onclick="confirmRestart()">↺ Restart</button>
  </div>
</header>

<div class="progress-row">
  <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:1%"></div></div>
  <div class="prog-label" id="prog-label">1 / 100</div>
</div>

<div class="dots-row" id="dots-row"></div>

<main>
  <div class="quiz-card" id="quiz-card">
    <div class="card-top">
      <div class="q-meta">
        <div class="q-num-tag" id="q-num-tag">#101</div>
        <div class="q-topic-tag" id="q-topic-tag">General</div>
      </div>
      <div class="q-text" id="q-text"></div>
    </div>
    <div class="options" id="options-container"></div>
    <div class="verdict-row" id="verdict-row">
      <div class="verdict-box" id="verdict-box">
        <span class="verdict-icon" id="verdict-icon"></span>
        <span id="verdict-msg"></span>
      </div>
    </div>
    <div class="card-nav">
      <button class="nav-btn btn-prev" id="btn-prev" onclick="goTo(currentIdx-1)">← Prev</button>
      <div class="q-counter" id="q-counter">1 of 100</div>
      <button class="nav-btn btn-next" id="btn-next" onclick="nextQuestion()">Next →</button>
    </div>
  </div>

  <div id="results-screen">
    <div class="result-glow">🎯</div>
    <div class="result-title">Quiz Complete!</div>
    <div class="result-sub">49th BCS Preliminary Exam (ICT) — 100 Questions</div>
    <div class="result-score-big" id="r-pct">0%</div>
    <div class="result-grid">
      <div class="result-stat"><div class="rs-val g" id="r-correct">0</div><div class="rs-label">Correct</div></div>
      <div class="result-stat"><div class="rs-val r" id="r-wrong">0</div><div class="rs-label">Wrong</div></div>
      <div class="result-stat"><div class="rs-val y" id="r-skip">0</div><div class="rs-label">Skipped</div></div>
    </div>
    <button class="result-restart-btn" onclick="restartQuiz()">↺ Try Again</button>
  </div>
</main>

<script>
const L = ['ক','খ','গ','ঘ'];

const questions = [
  {n:101,t:"Database",q:"Which one is not an ACID property?",o:["Authenticity","Consistency","Isolation","Durability"],a:0},
  {n:102,t:"Networking",q:"Which of the following is a guided transmission medium?",o:["Radiowave","Microwave","Coaxial Cable","Infrared"],a:2},
  {n:103,t:"C Programming",q:"In C, to retain the values of variables between function calls, we should use:",o:["auto","extern","static","register"],a:2},
  {n:104,t:"OS",q:"Thrashing in memory management occurs when:",o:["Page size is too small","CPU utilization is very high","The system spends more time swapping pages than executing processes","Page table is too large"],a:2},
  {n:105,t:"Networking",q:"_______ is used to store web addresses for future use?",o:["Routing","DNS resolution","Caching","ARP resolution"],a:2},
  {n:106,t:"Networking",q:"Which one is false with respect to a VLAN?",o:["Provides a logical separation on Layer 2","Improves security","VLAN tag can distinguish traffic","Increases network management complexity"],a:3},
  {n:107,t:"OS",q:"In virtual memory, TLB is used to:",o:["Store instructions","Control data transfers","Handle cache misses","Translate virtual address to physical address quickly"],a:3},
  {n:108,t:"Networking",q:"A router processes packets @1 Gbps; if 10 packets (1200 bytes each) arrive at once, queuing delay for the 10th packet (in μs) is:",o:["96","86.4","115.2","120"],a:0},
  {n:109,t:"AI / ML",q:"_______ method is a first order optimization method.",o:["Newton","Quasi-Newton","Gradient descent","Conjugate gradient"],a:2},

  {n:111,t:"Data Structures",q:"For a n-element min-Heap:",o:["The smallest element can be found anywhere in the heap","It is a type of binary search tree","Accessing an arbitrary element is an O(n) operation","The largest element is always at the root"],a:2},
  {n:112,t:"Architecture",q:"Cache hit rate=80%; cache access time=5 ns; memory access time=50 ns. Effective access time (in ns):",o:["15","45","50","55"],a:3},
  {n:113,t:"Algorithms",q:"What will be the time complexity of this algorithm?\nsum=0;\nfor(i=1; i<=n; i=i*2)\n  for(j=1; j<n; j++)\n    sum+=i*j;",o:["O(n)","O(log n)","O(n²)","O(n log n)"],a:3},
  {n:114,t:"Compiler",q:"What output will be generated by the compiler after lexical and syntax analyses, respectively?",o:["Tokens and a parse tree","A parse tree and tokens","A Syntax tree and intermediate codes","Tokens and error messages"],a:0},
  {n:115,t:"OOP",q:"Which one is a compile time polymorphism?",o:["Virtual function","Operator overloading","Function overriding","Dynamic binding"],a:1},
  {n:116,t:"Discrete Math",q:"A relation R on a set B is an equivalence relation if it is:",o:["Reflexive and symmetric","Reflexive and transitive","Symmetric and transitive","Reflexive, symmetric and transitive"],a:3},
  {n:117,t:"Networking",q:"_______ operates at the network layer and is used to connect different networks?",o:["Hub","Switch","Router","Repeater"],a:2},

  {n:121,t:"Data Structures",q:"For BFS of a graph, we should use:",o:["Queue","Stack","Priority queue","Deque"],a:0},
  {n:122,t:"Software Engg",q:"In Agile, backlog refers to the list of:",o:["Completed tasks","Pending bugs","Features and tasks to be developed","Rejected requirements"],a:2},
  {n:123,t:"OS",q:"_______ uses disk space as an extension of RAM.",o:["Caching","Virtual memory","Spooling","Buffer"],a:1},
  {n:124,t:"Numerical",q:"Newton's backward interpolation formula is the most effective when:",o:["Interpolation point is near the beginning","Interpolation point is near the end","Data points are not equally spaced","Function is non-polynomial"],a:1},
  {n:125,t:"Networking",q:"The address block 192.168.16.0/20 contains _______ IP Addresses.",o:["1024","4096","2048","65536"],a:1},

  {n:149,t:"OS",q:"_______ is a non-preemptive algorithm.",o:["FCFS","Round Robin","Shortest Remaining Time","None of the above"],a:0},
  {n:150,t:"Numerical",q:"Which one below is an iterative method?",o:["Gauss elimination","Gauss-Seidel","Cramer's rule","Matrix inversion"],a:1},
  {n:151,t:"Database",q:"A primary key:",o:["Can have NULL","Uniquely identifies each row","Must be a foreign key","Can have duplicates"],a:1},
  {n:152,t:"OS",q:"A page fault occurs when:",o:["A deadlock happens","Segmentation starts","Page is found in memory","Page is not found in memory"],a:3},

let currentIdx = 0;
let answers = new Array(questions.length).fill(null);

function initDots() {
  const row = document.getElementById('dots-row');
  row.innerHTML = questions.map((_,i) =>
    `<div class="dot" id="dot-${i}" onclick="goTo(${i})" title="Q${questions[i].n}"></div>`
  ).join('');
}

function updateDots() {
  questions.forEach((_,i) => {
    const d = document.getElementById('dot-'+i);
    d.className = 'dot';
    if (i === currentIdx) d.classList.add('current');
    else if (answers[i] !== null) d.classList.add(answers[i].correct ? 'correct' : 'wrong');
  });
}

function render() {
  const q = questions[currentIdx];
  const ans = answers[currentIdx];
  const done = ans !== null;

  document.getElementById('q-num-tag').textContent = '#' + q.n;
  document.getElementById('q-topic-tag').textContent = q.t;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-counter').textContent = (currentIdx+1) + ' of ' + questions.length;

  // Options
  document.getElementById('options-container').innerHTML = q.o.map((opt,i) => {
    let cls = '';
    if (done) {
      if (i === q.a) cls = 'correct-opt';
      else if (!ans.correct && i === ans.chosen) cls = 'wrong-opt';
    }
    return `<button class="opt-btn ${cls}" ${done?'disabled':''} onclick="pick(${i})">
      <div class="opt-key">${L[i]}</div><span>${opt}</span>
    </button>`;
  }).join('');

  // Verdict
  const vRow = document.getElementById('verdict-row');
  if (done) {
    vRow.style.display = 'block';
    const vBox = document.getElementById('verdict-box');
    if (ans.correct) {
      vBox.className = 'verdict-box v-correct';
      document.getElementById('verdict-icon').textContent = '✓';
      document.getElementById('verdict-msg').textContent = 'Correct! Well done.';
    } else {
      vBox.className = 'verdict-box v-wrong';
      document.getElementById('verdict-icon').textContent = '✗';
      document.getElementById('verdict-msg').textContent = `Wrong! Correct: ${L[q.a]}) ${q.o[q.a]}`;
    }
  } else {
    vRow.style.display = 'none';
  }

  // Nav
  document.getElementById('btn-prev').disabled = currentIdx === 0;
  document.getElementById('btn-next').textContent =
    currentIdx === questions.length-1 ? 'Finish 🏁' : 'Next →';

  // Stats
  const correct = answers.filter(a=>a&&a.correct).length;
  const wrong = answers.filter(a=>a&&!a.correct).length;
  document.getElementById('hdr-q').textContent = (currentIdx+1)+'/100';
  document.getElementById('hdr-correct').textContent = correct;
  document.getElementById('hdr-wrong').textContent = wrong;
  document.getElementById('prog-fill').style.width = ((currentIdx+1)/questions.length*100)+'%';
  document.getElementById('prog-label').textContent = (currentIdx+1)+' / '+questions.length;

  updateDots();
}

function pick(chosen) {
  if (answers[currentIdx] !== null) return;
  const q = questions[currentIdx];
  answers[currentIdx] = { chosen, correct: chosen === q.a };
  render();
}

function nextQuestion() {
  if (currentIdx === questions.length-1) { showResults(); return; }
  currentIdx++;
  animCard();
}

function goTo(i) {
  if (i < 0 || i >= questions.length) return;
  currentIdx = i;
  animCard();
}

function animCard() {
  const card = document.getElementById('quiz-card');
  card.style.animation = 'none';
  requestAnimationFrame(() => {
    card.style.animation = 'fadeSlide 0.32s ease';
    render();
  });
}

function showResults() {
  const correct = answers.filter(a=>a&&a.correct).length;
  const wrong = answers.filter(a=>a&&!a.correct).length;
  const skip = answers.filter(a=>a===null).length;
  const pct = Math.round(correct/questions.length*100);
  document.getElementById('r-pct').textContent = pct+'%';
  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent = wrong;
  document.getElementById('r-skip').textContent = skip;
  document.getElementById('quiz-card').style.display = 'none';
  document.getElementById('results-screen').style.display = 'block';
  document.getElementById('prog-fill').style.width = '100%';
  document.getElementById('prog-label').textContent = '100 / 100';
}

function restartQuiz() {
  currentIdx = 0;
  answers = new Array(questions.length).fill(null);
  document.getElementById('quiz-card').style.display = '';
  document.getElementById('results-screen').style.display = 'none';
  render();
  window.scrollTo(0,0);
}

function confirmRestart() {
  if (confirm('Restart quiz? All answers will be cleared.')) restartQuiz();
}

// Init
initDots();
render();
</script>
